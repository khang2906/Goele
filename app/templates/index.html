<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Göle</title>
</head>
<body>
    <h1>Göle</h1>
    <p><a href="/events/new">+ Create a new event</a></p>
    <p>Upcoming events</p>

    {% for event in events %}
    <div>
        <h2><a href="/events/{{ event.id }}">{{ event.title }}</a></h2>
        <p>Sport: {{ event.sport }}</p>
        <p>Date: {{ event.date.strftime("%d.%m.%Y %H:%M") }}</p>
        <p>Meeting point: {{ event.meeting_point }}</p>
        <p>Pace: {{ event.pace }}</p>
    </div>
    <hr>
    {% endfor %}
</body>
</html>
